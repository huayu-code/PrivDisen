# ======================================================================
# PrivDisen Default Configuration
# ======================================================================

# --- General ---
seed: 42
device: "auto"            # auto | cuda:0 | cpu （auto 会自动检测）

# --- Dataset ---
dataset: "cifar10"
data_dir: "data/raw"
num_workers: 0            # Windows 兼容：设为 0；Linux/macOS 可改为 4

# --- VFL ---
num_parties: 2                # number of passive parties
partition_strategy: "vertical" # vertical feature split

# --- Model ---
bottom_model: "cnn"           # cnn | mlp
top_hidden_dim: 256
num_classes: 10

# --- PrivDisen ---
task_dim: 128                 # dimension of Z_task
private_dim: 64               # dimension of Z_private
vdm_hidden_dim: 256           # VDM internal hidden dim
alc_hidden_dims: [128, 64]    # Adversarial Label Classifier layers

# --- Loss Weights ---
alpha_schedule: "dann"        # dann | linear | constant
alpha_max: 1.0                # max adversarial weight
beta: 0.01                    # MI constraint strength (privacy knob)
gamma: 1.0                    # reconstruction loss weight
delta: 0.1                    # HSIC independence weight

# --- Training ---
epochs: 100
batch_size: 256
lr: 0.001
weight_decay: 0.0001
optimizer: "adam"
scheduler: "cosine"           # cosine | step | none

# --- Evaluation ---
eval_every: 5                 # evaluate every N epochs
attacks:
  - "norm"
  - "direction"
  - "model_completion"

# --- Logging ---
log_dir: "results/logs"
checkpoint_dir: "results/checkpoints"
figure_dir: "results/figures"
save_best: true
